# Vanilla Death Message Substitutions
#
# Use the corresponding vanilla translation key to override a message.
# You can provide multiple formats per key, and one will be chosen randomly.
#
# Supported Placeholders (if the vanilla message supports them):
# <arg0> - Usually the player
# <arg1> - Usually the killer or block/damage source
# <arg2> - Usually the weapon/item used
# <player> - Alias for <arg0>
# <killer> - Alias for <arg1>
# <item> - Alias for <arg2>
#
# Format: MiniMessage (https://docs.advntr.dev/minimessage/format.html)

